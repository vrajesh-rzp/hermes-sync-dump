name: Deploy Vrajesh.ai Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'dashboard-data/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        env:
          VITE_GITHUB_PAT: ${{ secrets.DASHBOARD_GITHUB_PAT }}
        run: npm run build

      - name: Commit built docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "ci: rebuild dashboard [skip ci]"
          git push
